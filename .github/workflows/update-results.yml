name: Update FIFA Results

on:
  schedule:
    - cron: '*/30 * * * *'   # на всеки 30 минути
  workflow_dispatch:          # позволява ръчно стартиране от GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          SEASON: '2026'
          LEAGUE_ID: '1'
        run: node scripts/update-results.js

      - name: Commit updated results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json data/results.json
          git diff --cached --quiet || git commit -m "chore: update results $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
