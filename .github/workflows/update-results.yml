name: Update World Cup Results

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Update results
        run: node scripts/update-results.js

      - name: Commit and push if changed
        run: |
          git config user.name  "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add results.json data/results.json
          git diff --cached --quiet || git commit -m "🏆 WC2026 резултати [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
