<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap');
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0a1829 0%, #0f2235 50%, #0a1829 100%); color: #ffffff; overflow-x: hidden; }
  </style>
</helmet>

<div style="min-height: 100vh; background: linear-gradient(135deg, #0a1829 0%, #0f2235 50%, #0a1829 100%); padding: 20px;">
  <section style="max-width: 1400px; margin: 0 auto; padding-bottom: 40px;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; margin-bottom: 60px;">
      <div style="display: flex; flex-direction: column; gap: 24px;">
        <div>
          <p style="margin: 0; font-size: 14px; font-weight: 600; letter-spacing: 2px; color: #ffd700; text-transform: uppercase;">🏆 World Championship</p>
          <h1 style="margin: 12px 0 0 0; font-size: clamp(32px, 8vw, 64px); font-weight: 800; line-height: 1.1; background: linear-gradient(135deg, #ffffff 0%, #ffd700 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">FIFA World Cup 2026</h1>
          <p style="margin: 16px 0 0 0; font-size: 18px; color: #b0c4de;">Canada • Mexico • USA</p>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div style="background: rgba(255, 215, 0, 0.08); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 12px; padding: 20px; backdrop-filter: blur(10px);">
            <p style="margin: 0; font-size: 12px; color: #8fa7b3; text-transform: uppercase; letter-spacing: 1px;">Matches Played</p>
            <p style="margin: 8px 0 0 0; font-size: 32px; font-weight: 800; color: #ffd700;"><span id="matchesValue">0</span>/72</p>
          </div>
          <div style="background: rgba(46, 204, 113, 0.08); border: 1px solid rgba(46, 204, 113, 0.2); border-radius: 12px; padding: 20px; backdrop-filter: blur(10px);">
            <p style="margin: 0; font-size: 12px; color: #8fa7b3; text-transform: uppercase; letter-spacing: 1px;">Total Goals</p>
            <p style="margin: 8px 0 0 0; font-size: 32px; font-weight: 800; color: #2ecc71;"><span id="goalsValue">0</span></p>
          </div>
        </div>
        <div style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 16px 20px;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <span style="font-size: 12px; color: #8fa7b3; text-transform: uppercase; letter-spacing: 1px;">Group Stage Progress</span>
            <span style="font-size: 14px; font-weight: 700; color: #ffd700;"><span id="progressValue">0</span>%</span>
          </div>
          <div style="width: 100%; height: 6px; background: rgba(255, 255, 255, 0.08); border-radius: 3px; overflow: hidden;">
            <div id="progressBar" style="height: 100%; background: linear-gradient(90deg, #2ecc71 0%, #ffd700 100%); width: 0%; transition: width 0.4s ease;"></div>
          </div>
        </div>
      </div>
      <div style="display: flex; justify-content: center; align-items: center; position: relative;">
        <div style="position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(255, 215, 0, 0.15), transparent 70%); border-radius: 50%; filter: blur(40px);"></div>
        <img src="emblem.png" alt="FIFA World Cup 2026" style="width: 100%; max-width: 320px; height: auto; position: relative; z-index: 1; filter: drop-shadow(0 20px 50px rgba(255, 215, 0, 0.2)); animation: float 3s ease-in-out infinite;">
      </div>
    </div>
  </section>

  <section style="max-width: 1600px; margin: 0 auto; padding-bottom: 60px;">
    <div style="margin-bottom: 32px;">
      <h2 style="margin: 0; font-size: 32px; font-weight: 800; color: #ffffff;">Елиминации</h2>
      <p style="margin: 8px 0 0 0; font-size: 14px; color: #8fa7b3;" id="bracketStatus"></p>
    </div>
    <div id="bracketContainer" style="background: linear-gradient(135deg, rgba(255, 215, 0, 0.06) 0%, rgba(46, 204, 113, 0.04) 100%); border: 1px solid rgba(255, 215, 0, 0.15); border-radius: 16px; padding: 40px 20px; overflow-x: auto; min-height: 600px;"></div>
  </section>

  <section style="max-width: 1400px; margin: 0 auto; padding-bottom: 60px;">
    <div style="margin-bottom: 32px;">
      <h2 style="margin: 0; font-size: 32px; font-weight: 800; color: #ffffff;">Live Results</h2>
      <p style="margin: 8px 0 0 0; font-size: 14px; color: #8fa7b3;">Latest matches from group stage</p>
    </div>
    <div style="display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;">
      <select id="groupFilter" style="background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.3); color: #ffffff; padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px;">
        <option value="all">All Groups</option>
      </select>
      <select id="statusFilter" style="background: rgba(46, 204, 113, 0.1); border: 1px solid rgba(46, 204, 113, 0.3); color: #ffffff; padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px;">
        <option value="all">All Matches</option>
        <option value="played">Played</option>
        <option value="upcoming">Upcoming</option>
      </select>
    </div>
    <div id="resultsContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px;"></div>
  </section>

  <section style="max-width: 1400px; margin: 0 auto; padding-bottom: 60px;">
    <div style="margin-bottom: 32px;">
      <h2 style="margin: 0; font-size: 32px; font-weight: 800; color: #ffffff;">Group Standings</h2>
    </div>
    <div id="standingsContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px;"></div>
  </section>
</div>

<style>
  @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  select { transition: all 0.2s ease; }
  select:hover { background: rgba(255, 215, 0, 0.15); border-color: rgba(255, 215, 0, 0.5); }
</style>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;1600px&quot;}}">
class Component extends DCLogic {
  state = { scores: {}, knockoutScores: {}, groupFilter: 'all', statusFilter: 'all' };

  groups = {
    A: ["Mexico", "South Africa", "South Korea", "Czechia"],
    B: ["Canada", "Bosnia and Herzegovina", "Qatar", "Switzerland"],
    C: ["Brazil", "Morocco", "Haiti", "Scotland"],
    D: ["United States", "Paraguay", "Australia", "Turkey"],
    E: ["Germany", "Curacao", "Ivory Coast", "Ecuador"],
    F: ["Netherlands", "Japan", "Sweden", "Tunisia"],
    G: ["Belgium", "Egypt", "Iran", "New Zealand"],
    H: ["Spain", "Cape Verde", "Saudi Arabia", "Uruguay"],
    I: ["France", "Senegal", "Iraq", "Norway"],
    J: ["Argentina", "Algeria", "Austria", "Jordan"],
    K: ["Portugal", "DR Congo", "Uzbekistan", "Colombia"],
    L: ["England", "Croatia", "Ghana", "Panama"]
  };

  teamCountryCodes = {
    "Mexico": "mx", "South Africa": "za", "South Korea": "kr", "Czechia": "cz",
    "Canada": "ca", "Bosnia and Herzegovina": "ba", "Qatar": "qa", "Switzerland": "ch",
    "Brazil": "br", "Morocco": "ma", "Haiti": "ht", "Scotland": "gb-sct",
    "United States": "us", "Paraguay": "py", "Australia": "au", "Turkey": "tr",
    "Germany": "de", "Curacao": "cw", "Ivory Coast": "ci", "Ecuador": "ec",
    "Netherlands": "nl", "Japan": "jp", "Sweden": "se", "Tunisia": "tn",
    "Belgium": "be", "Egypt": "eg", "Iran": "ir", "New Zealand": "nz",
    "Spain": "es", "Cape Verde": "cv", "Saudi Arabia": "sa", "Uruguay": "uy",
    "France": "fr", "Senegal": "sn", "Iraq": "iq", "Norway": "no",
    "Argentina": "ar", "Algeria": "dz", "Austria": "at", "Jordan": "jo",
    "Portugal": "pt", "DR Congo": "cd", "Uzbekistan": "uz", "Colombia": "co",
    "England": "gb-eng", "Croatia": "hr", "Ghana": "gh", "Panama": "pa"
  };

  componentDidMount() {
    this.fetchResults();
    this.setupFilters();
    setInterval(() => this.fetchResults(), 30000);
  }

  fetchResults = async () => {
    try {
      const response = await fetch('results.json', { cache: 'no-store' });
      const data = await response.json();
      if (data.matches) this.setState({ scores: data.matches }, () => this.renderAll());
      if (data.knockout) this.setState({ knockoutScores: data.knockout }, () => this.renderAll());
    } catch (error) {
      console.error('Error loading results:', error);
      this.renderAll();
    }
  };

  setupFilters = () => {
    const groupFilter = document.getElementById('groupFilter');
    const statusFilter = document.getElementById('statusFilter');
    
    if (groupFilter) {
      Object.keys(this.groups).forEach(group => {
        const opt = document.createElement('option');
        opt.value = group;
        opt.textContent = `Group ${group}`;
        groupFilter.appendChild(opt);
      });
      groupFilter.addEventListener('change', (e) => {
        this.setState({ groupFilter: e.target.value }, () => this.renderMatches());
      });
    }
    
    if (statusFilter) {
      statusFilter.addEventListener('change', (e) => {
        this.setState({ statusFilter: e.target.value }, () => this.renderMatches());
      });
    }
  };

  getAllMatches = () => {
    const pairings = [[0, 1], [2, 3], [0, 2], [3, 1], [3, 0], [1, 2]];
    const groupDates = {
      A: ["Jun 11", "Jun 12", "Jun 18", "Jun 18", "Jun 24", "Jun 24"],
      B: ["Jun 12", "Jun 13", "Jun 18", "Jun 18", "Jun 24", "Jun 24"],
      C: ["Jun 13", "Jun 13", "Jun 19", "Jun 19", "Jun 24", "Jun 24"],
      D: ["Jun 12", "Jun 13", "Jun 19", "Jun 19", "Jun 25", "Jun 25"],
      E: ["Jun 14", "Jun 14", "Jun 20", "Jun 20", "Jun 25", "Jun 25"],
      F: ["Jun 14", "Jun 14", "Jun 20", "Jun 20", "Jun 25", "Jun 25"],
      G: ["Jun 15", "Jun 15", "Jun 21", "Jun 21", "Jun 26", "Jun 26"],
      H: ["Jun 15", "Jun 15", "Jun 21", "Jun 21", "Jun 26", "Jun 26"],
      I: ["Jun 16", "Jun 16", "Jun 22", "Jun 22", "Jun 26", "Jun 26"],
      J: ["Jun 16", "Jun 16", "Jun 22", "Jun 22", "Jun 27", "Jun 27"],
      K: ["Jun 17", "Jun 17", "Jun 23", "Jun 23", "Jun 27", "Jun 27"],
      L: ["Jun 17", "Jun 17", "Jun 23", "Jun 23", "Jun 27", "Jun 27"]
    };
    return Object.entries(this.groups).flatMap(([group, teams]) =>
      pairings.map(([hi, ai], idx) => ({
        id: `${group}-${idx + 1}`, group, date: groupDates[group][idx],
        home: teams[hi], away: teams[ai]
      }))
    );
  };

  isPlayed = (s) => s && s.home !== undefined && s.away !== undefined && s.home !== null && s.away !== null && s.home !== "" && s.away !== "";
  getFlagUrl = (t) => `https://flagcdn.com/w40/${this.teamCountryCodes[t] || 'un'}.png`;
  groupIsComplete = (g) => this.getAllMatches().filter(m => m.group === g).every(m => this.isPlayed(this.state.scores[m.id]));

  calculateTable = (group) => {
    const teams = this.groups[group];
    const rows = teams.map(team => ({ team, played: 0, won: 0, drawn: 0, lost: 0, goalsFor: 0, goalsAgainst: 0, goalDifference: 0, points: 0 }));
    const byTeam = Object.fromEntries(rows.map(r => [r.team, r]));
    this.getAllMatches().filter(m => m.group === group).forEach(m => {
      const s = this.state.scores[m.id];
      if (!this.isPlayed(s)) return;
      const h = byTeam[m.home], a = byTeam[m.away];
      const hg = Number(s.home), ag = Number(s.away);
      h.played += 1; a.played += 1; h.goalsFor += hg; h.goalsAgainst += ag; a.goalsFor += ag; a.goalsAgainst += hg;
      if (hg > ag) { h.won += 1; a.lost += 1; h.points += 3; }
      else if (ag > hg) { a.won += 1; h.lost += 1; a.points += 3; }
      else { h.drawn += 1; a.drawn += 1; h.points += 1; a.points += 1; }
    });
    rows.forEach(r => { r.goalDifference = r.goalsFor - r.goalsAgainst; });
    return rows.sort((a, b) => b.points - a.points || b.goalDifference - a.goalDifference || b.goalsFor - a.goalsFor);
  };

  renderMatches = () => {
    const c = document.getElementById('resultsContainer');
    if (!c) return;
    const allMatches = this.getAllMatches();
    const f = allMatches.filter(m => {
      const s = this.state.scores[m.id];
      const p = this.isPlayed(s);
      const go = this.state.groupFilter === 'all' || m.group === this.state.groupFilter;
      const so = this.state.statusFilter === 'all' || (this.state.statusFilter === 'played' ? p : !p);
      return go && so;
    });
    c.innerHTML = f.map(m => {
      const s = this.state.scores[m.id] || { home: '', away: '' };
      const p = this.isPlayed(s);
      const hg = Number(s.home || 0), ag = Number(s.away || 0);
      const rt = p ? (hg > ag ? 'Home Win' : ag > hg ? 'Away Win' : 'Draw') : 'Upcoming';
      const rc = p ? (hg > ag ? '#2ecc71' : ag > hg ? '#e74c3c' : '#3498db') : '#8fa7b3';
      return `<div style="background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 20px; backdrop-filter: blur(10px);"><div style="display: flex; justify-content: space-between; margin-bottom: 16px;"><span style="font-size: 12px; color: #8fa7b3;">Group ${m.group} • ${m.date}</span><span style="background: ${p ? 'rgba(46, 204, 113, 0.15)' : 'rgba(52, 152, 219, 0.15)'}; color: ${p ? '#2ecc71' : '#3498db'}; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;">${p ? 'Finished' : 'Live'}</span></div><div style="display: flex; align-items: center; margin-bottom: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.06);"><img src="${this.getFlagUrl(m.home)}" style="width: 24px; height: 16px; border-radius: 2px; margin-right: 12px;"><span style="flex: 1; font-weight: 600;">${m.home}</span><span style="font-size: 28px; font-weight: 800; color: #ffd700;">${s.home || '–'}</span></div><div style="display: flex; align-items: center; margin-bottom: 16px;"><img src="${this.getFlagUrl(m.away)}" style="width: 24px; height: 16px; border-radius: 2px; margin-right: 12px;"><span style="flex: 1; font-weight: 600;">${m.away}</span><span style="font-size: 28px; font-weight: 800; color: #ffd700;">${s.away || '–'}</span></div><div style="text-align: center; padding-top: 12px; border-top: 1px solid rgba(255, 255, 255, 0.06);"><span style="color: ${rc}; font-weight: 700;">${rt}</span></div></div>`;
    }).join('');
  };

  renderStandings = () => {
    const c = document.getElementById('standingsContainer');
    if (!c) return;
    c.innerHTML = Object.keys(this.groups).map(g => {
      const t = this.calculateTable(g);
      const rh = t.map((r, i) => `<div style="display: grid; grid-template-columns: 1fr 30px 30px 40px; gap: 12px; align-items: center; padding: 10px 0; ${i < t.length - 1 ? 'border-bottom: 1px solid rgba(255, 255, 255, 0.04);' : ''}"><div style="display: flex; align-items: center; gap: 8px;"><span style="font-weight: 600; color: #8fa7b3; width: 20px;">${i + 1}</span><img src="${this.getFlagUrl(r.team)}" style="width: 20px; height: 14px; border-radius: 2px;"><span style="font-size: 13px; font-weight: 600;">${r.team}</span></div><span style="font-size: 12px; color: #8fa7b3; text-align: center;">${r.played}</span><span style="font-size: 12px; color: #8fa7b3; text-align: center;">${r.goalDifference > 0 ? '+' : ''}${r.goalDifference}</span><span style="font-size: 14px; font-weight: 700; color: #ffd700; text-align: center;">${r.points}</span></div>`).join('');
      return `<div style="background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 20px; backdrop-filter: blur(10px);"><h3 style="margin: 0 0 16px 0; color: #ffd700; font-size: 18px; font-weight: 700;">Group ${g}</h3><div style="display: flex; flex-direction: column; gap: 8px;">${rh}</div></div>`;
    }).join('');
  };

  renderProgress = () => {
    const am = this.getAllMatches();
    const p = am.filter(m => this.isPlayed(this.state.scores[m.id])).length;
    const tg = am.reduce((s, m) => s + (this.isPlayed(this.state.scores[m.id]) ? Number(this.state.scores[m.id].home) + Number(this.state.scores[m.id].away) : 0), 0);
    const pp = Math.round((p / am.length) * 100);
    
    const me = document.getElementById('matchesValue');
    const ge = document.getElementById('goalsValue');
    const pe = document.getElementById('progressValue');
    const pb = document.getElementById('progressBar');
    
    if (me) me.textContent = p;
    if (ge) ge.textContent = tg;
    if (pe) pe.textContent = pp;
    if (pb) pb.style.width = pp + '%';
  };

  renderBracket = () => {
    const c = document.getElementById('bracketContainer');
    if (!c) return;
    const am = this.getAllMatches();
    const p = am.filter(m => this.isPlayed(this.state.scores[m.id])).length;
    const cc = Object.keys(this.groups).filter(g => this.groupIsComplete(g)).length;
    const se = document.getElementById('bracketStatus');
    if (se) se.textContent = p === am.length ? "🏆 Tournament Complete!" : `${cc}/12 groups complete • ${p}/72 matches played`;
    
    const getGroupWinner = (pos) => {
      try {
        const group = pos[0];
        const rank = parseInt(pos[1]);
        const table = this.calculateTable(group);
        return (table && table[rank - 1]) ? table[rank - 1].team : '–';
      } catch (e) {
        return '–';
      }
    };
    
    const knockoutRounds = [
      { title: 'Round of 16', matches: [
        { id: 'r16-1', w1: 'A1', w2: 'B2' }, { id: 'r16-2', w1: 'C1', w2: 'D2' },
        { id: 'r16-3', w1: 'E1', w2: 'F2' }, { id: 'r16-4', w1: 'G1', w2: 'H2' },
        { id: 'r16-5', w1: 'B1', w2: 'A2' }, { id: 'r16-6', w1: 'D1', w2: 'C2' },
        { id: 'r16-7', w1: 'F1', w2: 'E2' }, { id: 'r16-8', w1: 'H1', w2: 'G2' },
        { id: 'r16-9', w1: 'I1', w2: 'J2' }, { id: 'r16-10', w1: 'K1', w2: 'L2' },
        { id: 'r16-11', w1: 'I2', w2: 'J1' }, { id: 'r16-12', w1: 'K2', w2: 'L1' },
      ]},
      { title: 'Quarterfinals', matches: [
        { id: 'qf-1', w1: 'r16-1', w2: 'r16-2' }, { id: 'qf-2', w1: 'r16-3', w2: 'r16-4' },
        { id: 'qf-3', w1: 'r16-5', w2: 'r16-6' }, { id: 'qf-4', w1: 'r16-7', w2: 'r16-8' },
      ]},
    ];
    
    c.innerHTML = knockoutRounds.map(r => {
      const mh = r.matches.map(m => {
        const t1 = getGroupWinner(m.w1);
        const t2 = getGroupWinner(m.w2);
        const s = this.state.knockoutScores[m.id] || {};
        const hg = s.home !== undefined ? s.home : '';
        const ag = s.away !== undefined ? s.away : '';
        return `<div style="background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 8px; padding: 12px; margin-bottom: 8px;">
          <div style="display: flex; align-items: center; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid rgba(255, 255, 255, 0.06);">
            <img src="${this.getFlagUrl(t1)}" style="width: 20px; height: 14px; border-radius: 2px; margin-right: 8px;">
            <span style="flex: 1; font-size: 12px; font-weight: 600;">${t1}</span>
            <span style="font-size: 16px; font-weight: 800; color: #ffd700; width: 30px; text-align: center;">${hg || '–'}</span>
          </div>
          <div style="display: flex; align-items: center;">
            <img src="${this.getFlagUrl(t2)}" style="width: 20px; height: 14px; border-radius: 2px; margin-right: 8px;">
            <span style="flex: 1; font-size: 12px; font-weight: 600;">${t2}</span>
            <span style="font-size: 16px; font-weight: 800; color: #ffd700; width: 30px; text-align: center;">${ag || '–'}</span>
          </div>
        </div>`;
      }).join('');
      return `<div style="flex: 0 0 auto; min-width: 200px; padding-right: 20px;"><h3 style="margin: 0 0 12px 0; font-size: 12px; font-weight: 700; color: #8fa7b3; text-transform: uppercase;">${r.title}</h3><div>${mh}</div></div>`;
    }).join('');
    c.style.display = 'flex';
  };

  renderAll = () => {
    this.renderProgress();
    this.renderMatches();
    this.renderStandings();
    this.renderBracket();
  };

  renderVals() {
    setTimeout(() => this.renderAll(), 50);
    return {};
  }
}

</script>
</body>
</html>
